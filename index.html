<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guardian — Velion</title>

<style>
body{
margin:0;
font-family:Arial;
background:
radial-gradient(circle at 20% 20%, rgba(0,255,120,.15), transparent 30%),
radial-gradient(circle at 80% 10%, rgba(255,200,80,.12), transparent 30%),
#020503;
color:white;
}

.container{
display:flex;
align-items:center;
justify-content:space-between;
height:100vh;
padding:0 8%;
}

.left{
max-width:600px;
}

h1{
font-size:80px;
margin:0;
line-height:0.9;
}

.highlight{
background:linear-gradient(90deg,#7bffb3,#ffd66b);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p{
color:#aaa;
margin-top:25px;
font-size:18px;
}

button{
margin-top:35px;
padding:16px 35px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#7bffb3,#ffd66b);
color:black;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 30px rgba(0,255,120,.3);
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

.card{
width:420px;
height:260px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.1);
border-radius:20px;
backdrop-filter:blur(10px);
padding:25px;
box-shadow:0 0 60px rgba(0,255,120,.08);
}

.card h2{
margin:0;
}

.small{
color:#aaa;
margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

<div class="left">
<h1>Guardian<br><span class="highlight">Velion Engine</span></h1>
<p>Control total. Automatizare completă. Zero haos.</p>
<button>Invite Bot</button>
</div>

<div class="card">
<h2>Guardian System</h2>
<p class="small">Moderation • Tickets • AI • Giveaways</p>
<p class="small">Detectează • Decide • Acționează</p>
</div>

</div>

</body>
</html>
